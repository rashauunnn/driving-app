<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/roadready_logo.jpg" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>RoadReady | Technical Driving Course</title>

    <style>
      /* Removes the 300ms click delay and prevents blue highlight flicker on tap */
      * {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Prevents the rubber-band scrolling effect on iOS */
      html, body {
        overflow: hidden;
        height: 100%;
        position: fixed;
        width: 100%;
      }

      #root {
        height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
