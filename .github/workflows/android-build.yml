name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        # This flag is CRITICAL to bypass the version mismatch errors
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create Permanent Debug Keystore
        # This block forces the SHA-1 to stay exactly the same for every build
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Generate Signing Report
        run: |
          cd android
          ./gradlew signingReport

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoadReady-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk