name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create THE Permanent Keystore
        run: |
          mkdir -p android/app
          keytool -genkey -v -keystore android/app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Capture the SHA1 Forever
        run: |
          keytool -list -v -keystore android/app/debug.keystore -storepass android

      - name: Build APK with This Key
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.injected.signing.store.file=/home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}/android/app/debug.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android

      - name: Upload the Keystore File (DOWNLOAD THIS)
        uses: actions/upload-artifact@v4
        with:
          name: PERMANENT-KEYSTORE-FILE
          path: android/app/debug.keystore

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RoadReady-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk